<!DOCTYPE html>
<html>
<head>
  <title>Forex Library Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0b0f19;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px 15px;
      background: linear-gradient(135deg, #111827, #1f2937);
    }

    h1 { margin: 0; }

    .sub { color: #9ca3af; }

    .instructions {
      margin: 20px auto;
      max-width: 800px;
      padding: 20px;
      background: #111827;
      border-radius: 10px;
      text-align: center;
    }

    /* GRID FIXED */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 15px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #111827;
      border-radius: 10px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    /* MEDIUM IMAGE SIZE */
    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-body {
      padding: 10px;
      text-align: center;
    }

    .price {
      color: #00ffcc;
      font-weight: bold;
      margin: 5px 0;
    }

    .btn {
      display: block;
      margin: 4px 0;
      padding: 8px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .telebirr { background: #00ffcc; color: black; }
    .cbe { background: orange; color: black; }
    .telegram { background: #229ED9; color: white; }

    .payment-box {
      display: none;
      background: #0b0f19;
      padding: 8px;
      margin-top: 6px;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>

  <script>
    function showPayment(id) {
      let boxes = document.getElementsByClassName("payment-box");
      for (let i = 0; i < boxes.length; i++) {
        boxes[i].style.display = "none";
      }
      document.getElementById(id).style.display = "block";
    }
  </script>

</head>

<body>

<header>
  <h1>Forex Trading Library</h1>
  <p class="sub">Premium Forex Books & Strategies</p>
</header>

<div class="instructions">
  <h3>How to Buy</h3>
  <p>Select book → Pay → Send screenshot → Get files instantly</p>
</div>

<div class="grid">

<script>
for (let i = 1; i <= 50; i++) {
  document.write(`
    <div class="card">
      <img src="https://via.placeholder.com/300x200?text=Book+${i}">
      
      <div class="card-body">
        <h4>Forex Book ${i}</h4>
        <div class="price">$10</div>

        <a class="btn telebirr" onclick="showPayment('tb${i}')">Telebirr</a>
        <a class="btn cbe" onclick="showPayment('cbe${i}')">CBE</a>

        <div id="tb${i}" class="payment-box">
          <p>Telebirr: 0951729849</p>
          <p>Misgana Birhanu Mosisa</p>
          <a class="btn telegram" href="https://t.me/misganafx?text=I%20have%20paid%20for%20Book%20${i}">
            Send Screenshot
          </a>
        </div>

        <div id="cbe${i}" class="payment-box">
          <p>CBE: 1000608943874</p>
          <p>Misgana Birhanu Mosisa</p>
          <a class="btn telegram" href="https://t.me/misganafx?text=I%20have%20paid%20for%20Book%20${i}">
            Send Screenshot
          </a>
        </div>

      </div>
    </div>
  `);
}
</script>

</div>

</body>
  </html>
